<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Mochi Tasks ✨</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- ICON -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌸</text></svg>">

</head>

<body>

<!-- =========================
     CINEMATIC INTRO 🌸
========================= -->
<div id="intro">
  <div class="scene">

    <div class="twig"></div>

    <div class="flower-center"></div>

    <div class="glow"></div>

    <div id="petalContainer"></div>

  </div>
</div>

<!-- =========================
     POPUP
========================= -->
<div class="popup" id="popup">✨ Saved</div>

<!-- =========================
     DASHBOARD
========================= -->
<div class="dashboard">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <div>
      <h1 class="logo">Mochi 🌙</h1>
      <p class="tagline">Cozy productivity space</p>
    </div>

    <div class="profile">
      <div class="avatar" id="avatarPreview">🐻</div>

      <input type="text" id="profileName" placeholder="Your name ✨">
      <input type="file" id="profileUpload" accept="image/*">

      <p>Stay soft. Stay focused ✨</p>
    </div>

    <div class="stat-card">
      <div class="stat-title">Tasks Done</div>
      <div class="stat-number" id="completedCount">0</div>
    </div>

    <div class="stat-card">
      <div class="stat-title">Focus Score</div>
      <div class="stat-number" id="focusScore">0%</div>
    </div>

    <button class="theme-btn" onclick="toggleTheme()">🌙 Toggle Theme</button>

  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- TOP -->
    <div class="top-section">
      <div>
        <h1 class="main-title">Mochi Tasks ✨</h1>
        <p class="date" id="date"></p>
      </div>
    </div>

    <!-- TASKS -->
    <section class="focus-card">

      <h3>📝 Add Tasks</h3>

      <div class="input-section">
        <input type="text" id="taskInput" placeholder="Enter a cozy task...">

        <select id="priority">
          <option>🌸 Low</option>
          <option>✨ Medium</option>
          <option>🔥 High</option>
        </select>

        <button class="add-btn" onclick="addTask()">Add</button>
      </div>

      <div class="progress-wrapper">
        <div class="progress-label">
          <span>Progress</span>
          <span id="progressText">0%</span>
        </div>

        <div class="progress">
          <div class="progress-bar" id="progressBar"></div>
        </div>
      </div>

      <div class="tasks" id="taskList"></div>

    </section>

    <!-- MOOD + TIMER -->
    <div class="focus-wrapper">

      <section class="focus-card">
        <h3>🌸 Mood Tracker</h3>

        <div class="moods">
          <button onclick="setMood('😊')">😊</button>
          <button onclick="setMood('😴')">😴</button>
          <button onclick="setMood('😭')">😭</button>
          <button onclick="setMood('😤')">😤</button>
        </div>

        <p>Current Mood: <span id="moodDisplay">😊</span></p>
      </section>

      <section class="focus-card">
        <h3>⏰ Pomodoro</h3>

        <div id="timer">25:00</div>

        <div class="timer-buttons">
          <button onclick="startTimer()">▶</button>
          <button onclick="pauseTimer()">⏸</button>
          <button onclick="resetTimer()">🔄</button>
        </div>
      </section>

    </div>

    <!-- NOTES -->
    <section class="focus-card">
      <h3>📖 Notes</h3>

      <textarea id="notes" placeholder="Write your thoughts..."></textarea>

      <div class="note-actions">
        <button onclick="clearNotes()">🗑️ Clear</button>
      </div>
    </section>

  </main>
</div>

<!-- =========================
     MUSIC
========================= -->
<div class="music-controls">
  <button onclick="playMusic('lofi')">🎧 Lofi</button>
  <button onclick="stopMusic()">⏹️ Stop</button>
</div>

<!-- =========================
     AUDIO
========================= -->
<audio id="lofi" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/05/27/audio_1808fbf07a.mp3">
</audio>

<audio id="ding">
  <source src="https://cdn.pixabay.com/download/audio/2022/03/10/audio_c8631a2170.mp3">
</audio>

<audio id="piano" loop>
  <source src="PIANO_LINK">
</audio>

<audio id="wind" loop>
  <source src="WIND_LINK">
</audio>

<!-- SCRIPT -->
<script src="script.js"></script>

</body>
</html>
